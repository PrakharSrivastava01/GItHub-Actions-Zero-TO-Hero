name: Deploy Flask App

on:
    push:
        branches:
            - main
    
jobs:
    deploy:
        runs-on: self-hosted

        steps:
            - name: checkout code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Force cleanup all Docker resources
              run: |
                echo "Stopping all containers..."
                docker stop $(docker ps -aq) || true
                docker rm $(docker ps -aq) -f || true
                echo "Removing all images related to flask-app..."
                docker rmi flask-app:latest -f || true
                docker rmi github-actions-app -f || true
                docker rmi chintamani7978/github-actions-app -f || true
                echo "Pruning all unused Docker resources..."
                docker system prune -a -f || true

            - name: Verify Dockerfile
              run: |
                echo "=== Dockerfile Content ==="
                cat Dockerfile
                echo -e "\n=== requirements.txt Content ==="
                cat requirements.txt
                echo -e "\n=== app.py Content ==="
                head -20 app.py

            - name: Build Docker image
              run: |
                echo "Building fresh Flask Docker image..."
                docker build --no-cache -t flask-app:latest .
                echo "Build completed. Verifying image..."
                docker images | grep flask-app

            - name: Run Flask container
              run: |
                echo "Starting Flask container..."
                docker run -d \
                  -p 80:5000 \
                  --name flask-app \
                  flask-app:latest
                echo "Container started. Waiting for app..."
                sleep 3

            - name: Check container status
              run: |
                echo "=== Container Status ==="
                docker ps | grep flask-app
                echo -e "\n=== Container Logs ==="
                docker logs flask-app || true

            - name: Wait for Flask app to be ready
              run: |
                echo "Testing Flask app health..."
                for i in {1..30}; do
                  if curl -f http://localhost:80/ 2>/dev/null; then
                    echo "✅ Flask app is running!"
                    break
                  fi
                  echo "Attempt $i/30: Waiting for app..."
                  sleep 2
                done

            - name: Test Flask endpoints
              run: |
                echo "=== Testing / endpoint ==="
                curl -v http://localhost:80/ || true
                echo -e "\n=== Testing /health endpoint ==="
                curl -v http://localhost:80/health || true
                echo -e "\n=== Testing /api/message endpoint ==="
                curl -v http://localhost:80/api/message || true

            - name: Cleanup on failure
              if: failure()
              run: |
                echo "Deployment failed. Collecting logs..."
                docker logs flask-app || true
                docker stop flask-app || true
                docker rm flask-app || true